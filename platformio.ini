; ─────────────────────────────────────────────────────────────────────────────
; Flock-You — PlatformIO build configuration
; Two target boards are supported; pick one to build/flash:
;   esp32devkitc_16mb  — Espressif ESP32-DevKitC-32E (16 MB flash, standard)
;   xiao_esp32s3       — Seeed Studio XIAO ESP32-S3  ( 8 MB flash, compact)
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = esp32devkitc_16mb

; ── Shared settings ─────────────────────────────────────────────────────────
[common]
platform      = espressif32@^6.3.0
framework     = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed  = 921600
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
    mathieucarbou/ESP Async WebServer@^3.0.6
    bblanchon/ArduinoJson@^7.0.4
board_build.filesystem = spiffs

; ── ESP32-DevKitC-32E  (16 MB physical / 4 MB mapped, DIO 40 MHz) ──────────
[env:esp32devkitc_16mb]
extends = common
board   = esp32dev
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DFY_BUZZER_PIN=25          ; GPIO25 — GPIO3 is UART0 RX, must not use
board_build.partitions = partitions.csv
board_build.f_cpu       = 240000000L
board_build.f_flash     = 40000000L
board_build.flash_mode  = dio

; ── Seeed XIAO ESP32-S3  (8 MB flash, QIO 80 MHz, native USB) ──────────────
[env:xiao_esp32s3]
extends = common
board   = seeed_xiao_esp32s3
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DARDUINO_USB_MODE=1        ; native USB (not CH340)
    -DARDUINO_USB_CDC_ON_BOOT=1 ; Serial → USB CDC on boot
    -DFY_BUZZER_PIN=4           ; GPIO4 / D3 on XIAO header
board_build.partitions  = partitions_s3.csv
board_build.f_cpu       = 240000000L
board_build.f_flash     = 80000000L
board_build.flash_mode  = qio
board_build.flash_size  = 8MB
